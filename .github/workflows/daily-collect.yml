name: Daily Knowledge Collection

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collection pipeline
        env:
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python pipeline/pipeline.py \
            --sources github,rss \
            --limit 20 \
            --verbose

      - name: Validate articles
        run: |
          python hooks/validate_json.py knowledge/articles/

      - name: Check article quality
        run: |
          python hooks/check_quality.py knowledge/articles/

      - name: Commit and push changes
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          git add knowledge/raw/ knowledge/articles/

          if git diff --cached --quiet; then
            echo "No new articles to commit, skipping."
            exit 0
          fi

          ARTICLE_COUNT=$(git diff --cached --name-only -- knowledge/articles/ | grep '\.json$' | wc -l | tr -d ' ')

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "collect: ${ARTICLE_COUNT} articles on ${TODAY} [skip ci]"
          git push
